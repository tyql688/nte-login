services:
  nte-login:
    build: .
    image: nte-login:latest
    container_name: nte-login
    restart: unless-stopped
    ports:
      - "7861:7861"
    env_file:
      - path: .env
        required: false
    # 也可以直接 inline 覆盖（优先级高于 .env）
    # environment:
    #   SHARED_SECRET: ${SHARED_SECRET:-}
    #   LOG_LEVEL: INFO
